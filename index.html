<!DOCTYPE html>

<html>
<head>
  <title>Calculator</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    .calc {
      width: 100vw;
      height: 100vh;
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    input {
      width: 90%;
      height: 60px;
      font-size: 28px;
      text-align: right;
      margin-bottom: 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 90%;
      gap: 10px;
    }

    button {
      height: 70px;
      font-size: 22px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: cyan;
      color: black;
    }

    #diary {
      display: none;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      height: 200px;
      font-size: 18px;
      margin-bottom: 10px;
    }

    #chatBox {
      height: 200px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      text-align: left;
    }

    .msg {
      background: #333;
      padding: 5px;
      margin: 5px 0;
      border-radius: 5px;
    }
  </style>

</head>

<body>

<!-- CALCULATOR -->

<div class="calc" id="calc">

  <input id="screen" disabled>

  <div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('+')">+</button>

  </div>

</div>

<!-- DIARY + CHAT -->

<div id="diary">

  <h2>📔 My Private Diary</h2>

  <textarea id="text" placeholder="Write your diary..."></textarea><br>

<button onclick="save()">Save</button> <button onclick="load()">Load</button>

  <h3>💬 Private Chat</h3>

  <div id="chatBox"></div>

  <input id="chatInput" placeholder="Type message..." style="width:70%;">
  <button onclick="sendMsg()">Send</button>

</div>

<script>
let input = "";
const SECRET = "1234";

// calculator
function press(val) {
  input += val;
  document.getElementById("screen").value = input;
}

function clearScreen() {
  input = "";
  document.getElementById("screen").value = "";
}

function unlock() {

  if (input === SECRET) {
    document.getElementById("calc").style.display = "none";
    document.getElementById("diary").style.display = "block";
    load();
    loadChat();
    return;
  }

  try {
    let result = eval(input);
    document.getElementById("screen").value = result;
    input = result.toString();
  } catch {
    document.getElementById("screen").value = "Error";
    input = "";
  }
}

// diary
function save() {
  localStorage.setItem("diary", document.getElementById("text").value);
  alert("Saved ✔");
}

function load() {
  document.getElementById("text").value =
    localStorage.getItem("diary") || "";
}

// chat
function loadChat() {
  let chat = JSON.parse(localStorage.getItem("chat") || "[]");
  let box = document.getElementById("chatBox");
  box.innerHTML = "";

  chat.forEach(msg => {
    let div = document.createElement("div");
    div.className = "msg";
    div.textContent = msg;
    box.appendChild(div);
  });
}

function sendMsg() {
  let input = document.getElementById("chatInput");
  let text = input.value.trim();

  if (!text) return;

  let chat = JSON.parse(localStorage.getItem("chat") || "[]");
  chat.push(text);

  localStorage.setItem("chat", JSON.stringify(chat));

  input.value = "";
  loadChat();
}
</script>

</body>
</html>
